services:
  quality-flow-ng-app-dev:
    image: nginx:1.28.0-alpine
    container_name: quality-flow-ng-app-dev
    environment:
      # Defaults to the sibling BE container on the shared `wildflyNet` network.
      # Override with QUALITY_FLOW_API_HOST=host.docker.internal when the BE
      # runs on the host instead of in compose.
      QUALITY_FLOW_API_HOST: ${QUALITY_FLOW_API_HOST:-quality-flow}
      QUALITY_FLOW_API_PORT: ${QUALITY_FLOW_API_PORT:-9082}
    volumes:
      - ../../dist/apps/quality-flow-ng-app/browser:/usr/share/nginx/html/quality-flow-ng-app:ro
      - ./nginx.conf.template.dev:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "4400:80"
    networks:
      - wildflyNet

networks:
  wildflyNet:
    external: true
