@if ((searchData$ | async); as data) {
  @if (data && data.length > 0) {
  }
} @else {
  <div class="search-result__no-value">
    <i class="fa-regular fa-face-sad-tear search-result__no-value-icon"></i>
    <span class="search-result__no-value-text">No results found</span>
  </div>
}
@for (item of (searchData$ | async); track item) {
  <div class="search-result">
    <div class="search-result__menu-item" [class.menu-item--selected]="item.isSelected" (click)="selectItem(item)">
      <span class="search-result__menu-text" (click)="selectItem(item)" [title]="item.name">
        {{ item.name }}
      </span>
    </div>
  </div>
}
